<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pergunta importante</title>
    <style>
      body {
    /* Substitua a URL abaixo pelo link do seu GIF */
    background-image: url('https://media1.tenor.com/m/xCqVPUii0nUAAAAC/banner-discord.gif');
    background-size: cover; /* Faz o GIF preencher toda a tela */
    background-position: center; /* Centraliza o GIF */
    background-repeat: no-repeat; /* Evita que o GIF se repita */
    background-attachment: fixed; /* Mantém o fundo fixo ao rolar */
    
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
}
        .painel {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #d32f2f; }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            margin: 10px;
            transition: 0.3s;
        }
        #sim { background-color: #4caf50; color: white; }
        #nao { background-color: #f44336; color: white; position: relative; }
    </style>
</head>
<body>

    <div class="painel">
        <h1>Quer namorar comigo?</h1>
        <button id="sim">SIM</button>
        <button id="nao">NÃO</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const botaoNao = document.getElementById('nao');
            const botaoSim = document.getElementById('sim');

            botaoNao.addEventListener('mouseover', () => {
                const x = Math.random() * (window.innerWidth - botaoNao.offsetWidth);
                const y = Math.random() * (window.innerHeight - botaoNao.offsetHeight);
                
                botaoNao.style.position = 'absolute';
                botaoNao.style.left = x + 'px';
                botaoNao.style.top = y + 'px';
            });

            botaoSim.addEventListener('click', () => {
                alert('TE AMO MINHA PRINCESAAAAAA! ❤️');
            });
        });
    </script>
</body>
</html>
